<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой счётчик</title>
  <style>
    /* Это стили — как будет выглядеть страница */
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #f0f4f8;
    }
    h1 {
      font-size: 80px;
      margin: 20px;
      color: #333;
    }
    button {
      font-size: 24px;
      padding: 15px 40px;
      background: #e23a3a;   /* красный цвет */
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;           /* немного воздуха между кнопками */
    }
    button:hover {
      background: #b82828;   /* при наведении — потемнее */
    }
    /* Отдельный стиль для кнопки "Сбросить" — серый, чтобы её было видно отдельно */
    button.sbros {
      background: #888;
    }
    button.sbros:hover {
      background: #555;
    }
  </style>
</head>
<body>

  <!-- Здесь будет показано число. Сначала 0 -->
  <h1 id="chislo">0</h1>

  <!-- Кнопка, на которую будем нажимать -->
  <button onclick="dobavit()">Жми сюда</button>

  <!-- Вторая кнопка — сбрасывает счётчик на 0 -->
  <button class="sbros" onclick="sbrosit()">Сбросить</button>

  <script>
    // Заводим переменную (коробочку), в которой храним число
    let schet = 0;

    // Эта функция запускается при нажатии на кнопку "Жми сюда"
    function dobavit() {
      schet = schet + 1;                                 // увеличиваем число на 1
      document.getElementById("chislo").innerText = schet; // показываем новое число на странице
    }

    // Эта функция запускается при нажатии на кнопку "Сбросить"
    function sbrosit() {
      schet = 0;                                         // обнуляем число
      document.getElementById("chislo").innerText = schet; // показываем 0 на странице
    }
  </script>

</body>
</html>
